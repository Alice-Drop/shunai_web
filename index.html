<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的歌单！</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <header class="site-header">
      <nav class="topbar" aria-label="主导航">
        <a class="brand" href="#">
          <span class="brand-mark">♪</span>
          <span>鼠奈歌单</span>
        </a>
        <div class="status-pill" aria-label="当前页面状态">
          <span class="status-dot"></span>
          LIVE SETLIST
        </div>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">V / SV / U cover notes</p>
          <h1 id="page-title">我的歌单！</h1>
          <p class="intro">
            主要是术力口，所以非术力口会单独列出来，不列在那里的都是术力口。
          </p>
          <p class="intro compact">
            这边的称呼包括了 V、SV、U。在简介这里的是临时歌单，以后建设个人网站会有更豪华的。
          </p>
        </div>

        <div class="stage" aria-hidden="true">
          <div class="monitor">
            <div class="equalizer">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="avatar">
              <div class="hair hair-left"></div>
              <div class="hair hair-right"></div>
              <div class="head">
                <div class="bang bang-a"></div>
                <div class="bang bang-b"></div>
                <div class="eye eye-left"></div>
                <div class="eye eye-right"></div>
                <div class="mouth"></div>
              </div>
              <div class="ribbon"></div>
              <div class="body"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="controls-panel" aria-label="歌单筛选">
        <label class="search-box">
          <span>⌕</span>
          <input id="song-search" type="search" placeholder="搜索歌曲 / 中文名" autocomplete="off" />
        </label>
        <div class="filter-tabs" role="tablist" aria-label="歌单分类">
          <button class="filter-tab is-active" role="tab" aria-selected="true" type="button" data-filter="all">全部</button>
          <button class="filter-tab" role="tab" aria-selected="false" type="button" data-filter="vocaloid">术力口</button>
          <button class="filter-tab" role="tab" aria-selected="false" type="button" data-filter="kotonoha">琴叶姐妹</button>
          <button class="filter-tab" role="tab" aria-selected="false" type="button" data-filter="nonvocaloid">非术力口</button>
        </div>
      </section>

      <section class="song-board" aria-live="polite">
        <div class="board-head">
          <div>
            <p class="eyebrow">temporary playlist</p>
            <h2 id="result-title">全部歌曲</h2>
          </div>
          <p class="song-count"><span id="result-count">0</span> 首</p>
        </div>
        <div id="song-sections" class="song-sections"></div>
        <p id="empty-state" class="empty-state" hidden>没有找到匹配的歌曲。</p>
      </section>
    </main>

    <footer class="site-footer">
      <span>Shuna Setlist Room</span>
      <span>Now loading a grander personal site</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
